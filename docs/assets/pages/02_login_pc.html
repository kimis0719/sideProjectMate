      body {

</div>
<h1 class="font-headline font-bold text-[3.5rem] leading-tight text-white mb-6">

                </h1>
<p class="font-body text-lg text-white/80 max-w-md">

</div>
<div class="relative z-10 mt-auto">
<div class="flex flex-col gap-6">
<div class="flex -space-x-3">

<img alt="User 2" class="w-10 h-10 rounded-full border-2 border-primary ring-2 ring-primary/20" data-alt="modern young man portrait with clean minimalist background and soft focus" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcJSlhbe_keh4haYLwBLGSZiCj89ZzvwV5VKkftZ27tWmXq6JweNiflW2nuMfP6MgS39YWifBMcstyhmy0AW40gk4ERHcJHHbAA2HyCZ_Bs_3J9JauDzxQDNoG8tiDNOcZe29PkjyM3T28dMa9jk5VfgSJoetusbL3AyAIEfdATHuINcJ6ICOEiIMHIgxPM-CG-fxZjl_Kpz9tDP01C9mcXW5BQQJEEcmWz7o3v_ROpTqqGykeCQke2GrBUC1QgMLpjXrFgsq8W0h6"/>
<img alt="User 3" class="w-10 h-10 rounded-full border-2 border-primary ring-2 ring-primary/20" data-alt="confident professional in business attire with natural morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3kOBqMC2GZN-1Q_Fx7Qcxy535NZaItw0ULuELqBWC6V1JMUfqECvQGvc2F9AgwW88GMBBf4EATD0KrK_1y8OLIYUTLejX9TJ3CxykqhnDfpsusymFZBa9H9HQE97sdg8OtkHq8zFzy80MpVevnhCN_ep_vKXuANSg36ZW_US1rrJtQ8to2mk37zOChmb2WTejQSx0ajFUPqQIx7PF3rxuR7T9hBPmky-hNEevdq8wm6nTJN2g5Fvaweem0xIQnm_rSD37EoM1z1H9"/>
<div class="w-10 h-10 rounded-full border-2 border-primary bg-primary-container flex items-center justify-center text-xs font-bold text-white">+2.4k</div>
</div>
<p class="font-body text-sm font-medium text-white/90">
                        2,400명의 메이커가 함께하고 있습니다.
                    </p>
</div>
</div>
</section>
<!-- Right Side: Login Form -->
<section class="flex flex-col items-center justify-center p-8 md:p-16 lg:p-24 bg-surface">
<div class="w-full max-w-md">
<!-- Mobile Logo -->
<div class="lg:hidden mb-12 flex justify-center">
<span class="text-primary font-headline font-extrabold text-3xl tracking-tighter">SPM</span>
</div>
<div class="mb-10 text-center lg:text-left">
<h2 class="font-headline font-semibold text-2xl text-on-surface mb-2">로그인</h2>
<p class="font-body text-on-surface-variant">계정에 로그인하고 프로젝트를 이어가세요.</p>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-lowest rounded-lg font-body font-medium text-on-surface-variant hover:bg-surface-bright transition-all active:scale-[0.98]">
<img alt="Google" class="w-5 h-5" data-alt="google multi-color icon logo on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUsTINwNJJfBasXYR82cRsQbonP-Ru0jpl7FISgJe63fWDenaLpt0AIHIXuyO3WPEzMBqR3-scg6iW38QoAnAVg0atIiRoQz_wvNS_lb_2S7_GEGq3o_0VeFc2fyJO9uxhCRZDz91FY-4CtYj1nmPbaUICgDKxMzSV60598QPcpro3qlLEa6N7FdEEWGVChgS3IblboOUZtWOgLPWuZFCd4v1uONqSWcp4E8GV5QSaE4UO71Qh_62deW0pr_-WFigvoafZMWoNuoJE"/>
<span class="text-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-lowest rounded-lg font-body font-medium text-on-surface-variant hover:bg-surface-bright transition-all active:scale-[0.98]">

<div class="relative flex items-center mb-8">

<span class="px-4 text-xs font-label font-semibold text-outline tracking-widest uppercase">또는</span>
<div class="flex-grow h-px bg-surface-container-high"></div>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-1.5">
<label class="block font-label text-[11px] font-bold text-outline tracking-wider uppercase ml-1" for="email">이메일</label>
<div class="relative">
<input class="w-full px-5 py-3.5 bg-surface-container-low rounded-lg text-on-surface font-body text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all border-none placeholder:text-outline/50" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-[11px] font-bold text-outline tracking-wider uppercase" for="password">비밀번호</label>
<a class="text-[11px] font-bold text-primary hover:text-surface-tint transition-colors" href="#">비밀번호를 잊으셨나요?</a>
</div>
<div class="relative">
<input class="w-full px-5 py-3.5 bg-surface-container-low rounded-lg text-on-surface font-body text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all border-none placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full py-4 bg-primary-container text-on-primary font-body font-semibold rounded-lg shadow-sm hover:shadow-md hover:translate-y-[-1px] transition-all active:scale-[0.98] active:translate-y-0" type="submit">
                            로그인
                        </button>
</div>
</form>
<div class="mt-10 text-center">
<p class="font-body text-sm text-on-surface-variant">
                        계정이 없으신가요? 
                        <a class="ml-1 font-bold text-primary hover:text-surface-tint underline decoration-primary/30 underline-offset-4" href="#">회원가입</a>
</p>
</div>
</div>
<!-- Footer Meta Links -->
<div class="mt-auto pt-12 flex gap-6">
<a class="text-[10px] font-label font-bold text-outline tracking-widest uppercase hover:text-on-surface transition-colors" href="#">이용약관</a>
<a class="text-[10px] font-label font-bold text-outline tracking-widest uppercase hover:text-on-surface transition-colors" href="#">개인정보처리방침</a>
