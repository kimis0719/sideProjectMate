<body class="bg-background font-body text-on-surface overflow-hidden">

<a class="font-['Noto_Sans_KR'] text-sm font-semibold tracking-tight text-[#1a1c1c]/60 dark:text-[#f9f9f8]/60 hover:text-[#2563eb] transition-all duration-300" href="#">히스토리</a>
<a class="font-['Noto_Sans_KR'] text-sm font-semibold tracking-tight text-[#1a1c1c]/60 dark:text-[#f9f9f8]/60 hover:text-[#2563eb] transition-all duration-300" href="#">에셋</a>

<button class="text-[#1a1c1c]/40 p-3 hover:text-[#2563eb] hover:scale-110 transition-all duration-200">
<span class="material-symbols-outlined">draw</span>
<span class="block text-[8px] font-bold uppercase mt-1">펜</span>

<button class="text-[#1a1c1c]/40 p-3 hover:text-[#2563eb] hover:scale-110 transition-all duration-200">

</button>

<!-- Infinite Canvas Area -->
<main class="relative w-screen h-screen pt-16 dot-grid overflow-hidden">

<svg class="absolute inset-0 pointer-events-none w-full h-full z-10">
<path d="M450 300 Q 550 250 650 350" fill="none" stroke="#1a1c1c" stroke-dasharray="5,5" stroke-width="2"></path>
<path d="M700 450 L 900 400" fill="none" marker-end="url(#arrowhead)" stroke="#1a1c1c" stroke-width="2"></path>
<defs>
<marker id="arrowhead" markerheight="7" markerwidth="10" orient="auto" refx="0" refy="3.5">
<polygon fill="#1a1c1c" points="0 0, 10 3.5, 0 7"></polygon>
</marker>
</defs>
</svg>
<!-- Canvas Content Wrapper (Centered viewport) -->
<div class="relative w-[2000px] h-[2000px] left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
<!-- Sections (Hand-drawn look) -->
<div class="absolute top-[300px] left-[200px] w-[500px] h-[600px] border-4 border-dashed border-outline/30 rounded-[40px] flex flex-col p-8 opacity-60">
<span class="marker-font text-3xl font-bold text-outline">할 일</span>
</div>
<div class="absolute top-[300px] left-[750px] w-[500px] h-[600px] border-4 border-dashed border-primary/20 rounded-[40px] flex flex-col p-8 opacity-60 bg-primary/5">

</div>
<div class="absolute top-[300px] left-[1300px] w-[500px] h-[600px] border-4 border-dashed border-emerald-500/20 rounded-[40px] flex flex-col p-8 opacity-60">

</div>
<!-- Sticky Notes -->

</div>
</div>
<!-- Pink -->

<div class="absolute top-1/4 left-1/4 w-1/4 h-1/2 border border-outline/30 rounded"></div>
