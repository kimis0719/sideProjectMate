services:
  - type: web
    name: sideprojectmate
    env: node
    buildCommand: npm install && npm run build
    startCommand: 'npm start'
    envVars:
      - key: NODE_ENV
        value: production
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    plan: free
    healthCheckPath: /api/status
    ignoredPaths:
      - work-logs/**
      - docs/**
      - '**/*.md'
      - .claude/**
