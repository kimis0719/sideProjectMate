name: Preview Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    name: 테스트 서버 배포
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: test-server 브랜치에 force push
        run: git push origin HEAD:test-server --force

      - name: PR에 테스트 서버 URL 댓글 등록
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-deploy-comment -->';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              '## 🚀 테스트 서버 배포',
              '',
              `커밋 \`${sha}\` 기준으로 테스트 서버에 배포 중입니다.`,
              'Render 빌드 완료 후 아래 URL에서 확인하세요.',
              '',
              '🔗 https://sideprojectmate-fkze.onrender.com/',
              '',
              '> PR 업데이트 시 자동으로 재배포됩니다.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
