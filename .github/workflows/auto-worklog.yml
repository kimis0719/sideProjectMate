name: Auto Work Log

on:
  workflow_dispatch: # 비활성화 — spm-done 스킬이 work-log 생성을 담당함

jobs:
  generate-worklog:
    name: Work Log 자동 생성
    runs-on: ubuntu-latest
    # 봇이 생성한 커밋은 건너뜀 (무한 루프 방지)
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 변경 파일 추출
        id: diff
        run: |
          # 이전 커밋이 없는 경우(첫 커밋) 처리
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            CHANGED=$(git diff HEAD~1 HEAD --name-only | grep -v '^work-logs/' || true)
            STAT=$(git diff HEAD~1 HEAD --stat | tail -1)
          else
            CHANGED=$(git show --name-only --format="" HEAD | grep -v '^work-logs/' || true)
            STAT="첫 번째 커밋"
          fi

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "stat=$STAT" >> $GITHUB_OUTPUT

          # work-logs 파일만 변경된 경우 스킵
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Claude API로 Work Log 생성
        if: steps.diff.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          CHANGED_FILES: ${{ steps.diff.outputs.changed_files }}
          DIFF_STAT: ${{ steps.diff.outputs.stat }}
        run: python3 scripts/generate-worklog.py

      - name: Work Log 커밋 & 푸시
        if: steps.diff.outputs.skip == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add work-logs/
          git diff --staged --quiet || git commit -m "docs: auto-generate work log [${{ github.sha }}]"
          git push
