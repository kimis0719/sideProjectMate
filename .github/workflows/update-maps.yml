name: Update MAP.md

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  update-maps:
    name: MAP.md 자동 갱신
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: MAP.md 갱신 실행
        run: node scripts/generate-maps.js

      - name: 변경사항 확인
        id: check
        run: |
          git add src/**/MAP.md
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: PR 생성
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/update-maps-$(date +%Y%m%d-%H%M%S)"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git commit -m "docs: auto-update MAP.md files"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "docs: auto-update MAP.md files" \
            --body "MAP.md 파일 자동 갱신 (GitHub Actions) — 코드 변경 없음, Render 배포 불필요" \
            --base main \
            --head "$BRANCH"
          # auto-merge 하지 않음 — MAP.md는 ignoredPaths에 포함되지만,
          # squash merge 시 Render가 배포를 트리거하는 문제 방지.
          # 다음 코드 PR 머지 시 함께 처리하거나 수동 머지.
